<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Producten Prijstabel</title>
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>
<h2>Producten Overzicht</h2>
<table>
  <thead>
  <tr>
    <th>producten</th>
    <th>prijs</th>
    <th>aantal</th>
    <th>btw</th>
    <th>subtotaal</th>
  </tr>
  </thead>
  <tbody>
  <tr>
    <td>product1</td>
    <td class="prijs">10.00</td>
    <td><input type="number" class="aantal" value="0"></td>
    <td class="btw">6</td>
    <td class="subtotaal">0.00</td>
  </tr>
  <tr>
    <td>product2</td>
    <td class="prijs">15.00</td>
    <td><input type="number" class="aantal" value="0"></td>
    <td class="btw">21</td>
    <td class="subtotaal">0.00</td>
  </tr>
  <tr>
    <td>product3</td>
    <td class="prijs">12.20</td>
    <td><input type="number" class="aantal" value="0"></td>
    <td class="btw">21</td>
    <td class="subtotaal">0.00</td>
  </tr>
  </tbody>
  <tfoot>
  <tr>
    <td colspan="4">totaal</td>
    <td id="totaal">0.00</td>
  </tr>
  </tfoot>
</table>
<br>
<button id="herberekenBtn">Herbereken</button>

<script src="scripts/script.js"></script>
</body>
</html>
